services:
  - type: web
    name: stock-proxy
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: POLYGON_KEY
        sync: false
      - key: FMP_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLAUDE_MODEL
        value: claude-3-5-sonnet-latest
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_REPO
        sync: false
